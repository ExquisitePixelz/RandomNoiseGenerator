<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>RandomNoiseGenerator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      /* Prevent iOS rubber-band/bounce scroll */
      overflow: hidden;
      position: fixed;
      background: #231f20;
    }

    #unity-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #unity-canvas {
      display: block;
      /* Critical: prevents browser from consuming touch events before Unity sees them */
      touch-action: none;
      outline: none;
    }

    #unity-loading-bar {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      font-size: 14px;
      z-index: 10;
    }

    #unity-progress-bar-empty {
      width: 240px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      margin-top: 12px;
    }

    #unity-progress-bar-full {
      height: 100%;
      background: #4a8fd4;
      border-radius: 3px;
      width: 0%;
      transition: width 0.15s ease;
    }

    #unity-error {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #ff6b6b;
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-align: center;
      padding: 20px;
      max-width: 80%;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div>RandomNoiseGenerator</div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-error"></div>
  </div>

  <script>
    var canvas      = document.querySelector("#unity-canvas");
    var loadingBar  = document.querySelector("#unity-loading-bar");
    var progressBar = document.querySelector("#unity-progress-bar-full");
    var errorDiv    = document.querySelector("#unity-error");

    // Size the canvas to the actual visible viewport (accounts for iOS browser chrome).
    function fitCanvas() {
      var w = window.innerWidth;
      var h = window.innerHeight;
      canvas.style.width  = w + "px";
      canvas.style.height = h + "px";
    }
    fitCanvas();
    window.addEventListener("resize", fitCanvas);
    // iOS fires orientationchange before new dimensions are ready.
    window.addEventListener("orientationchange", function() { setTimeout(fitCanvas, 200); });

    // Prevent double-tap zoom (iOS ignores user-scalable=no since iOS 10).
    var lastTap = 0;
    document.addEventListener("touchend", function(e) {
      var now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    // Prevent pinch-to-zoom.
    document.addEventListener("gesturestart", function(e) { e.preventDefault(); }, { passive: false });

    var buildUrl  = "Build";
    var loaderUrl = buildUrl + "/RandomNoiseGenerator.loader.js";
    var config = {
      dataUrl:            buildUrl + "/RandomNoiseGenerator.data.br",
      frameworkUrl:       buildUrl + "/RandomNoiseGenerator.framework.js.br",
      codeUrl:            buildUrl + "/RandomNoiseGenerator.wasm.br",
      streamingAssetsUrl: "StreamingAssets",
      companyName:        "DefaultCompany",
      productName:        "RandomNoiseGenerator",
      productVersion:     "1.0",
    };

    var script  = document.createElement("script");
    script.src  = loaderUrl;
    script.onload = function() {
      createUnityInstance(canvas, config, function(progress) {
        progressBar.style.width = (100 * progress) + "%";
      }).then(function(unityInstance) {
        loadingBar.style.display = "none";
      }).catch(function(message) {
        errorDiv.style.display = "block";
        errorDiv.textContent   = "Failed to load: " + message;
        loadingBar.style.display = "none";
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
